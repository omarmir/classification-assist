<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Classification Assist</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Aptos, "Segoe UI", sans-serif;
        background: #07111f;
        color: #edf2f7;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(245, 158, 11, 0.14), transparent 32%),
          linear-gradient(180deg, #0b1424 0%, #07111f 100%);
      }

      .shell {
        width: min(28rem, calc(100vw - 2rem));
        padding: 2rem;
        border: 1px solid rgba(148, 163, 184, 0.22);
        background: rgba(8, 15, 27, 0.86);
        backdrop-filter: blur(18px);
      }

      .mark {
        display: inline-flex;
        margin-bottom: 1rem;
        padding: 0.25rem 0.65rem;
        border: 1px solid rgba(245, 158, 11, 0.3);
        color: #fbbf24;
        letter-spacing: 0.12em;
        font-size: 0.75rem;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 0.6rem;
        font-size: clamp(2rem, 6vw, 2.9rem);
        line-height: 0.95;
      }

      p {
        margin: 0;
        color: rgba(226, 232, 240, 0.82);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="mark">Classification Assist</div>
      <h1>Preparing local review console.</h1>
      <p>Loading the client-only workspace and offline classification runtime.</p>
    </main>
  </body>
</html>
